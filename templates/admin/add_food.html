{% extends "base.html" %}

{% block title %}
Add Food
{% endblock %}

{% block content %}

<section class="section">

    <div class="container">

        <div class="glass p-4">

            <h3>Add Food</h3>

            <form method="POST">

                <input type="text"
                       name="name"
                       class="form-control"
                       placeholder="Food Name">

                <input type="number"
                       name="price"
                       class="form-control mt-2"
                       placeholder="Price">

                <select name="restaurant_id"
                        class="form-control mt-2">

                    {% for r in restaurants %}

                    <option value="{{ r.id }}">

                        {{ r.name }}

                    </option>

                    {% endfor %}

                </select>

                <button class="btn btn-warning mt-3 w-100">

                    Add Food

                </button>

            </form>

        </div>

    </div>

</section>

{% endblock %}
