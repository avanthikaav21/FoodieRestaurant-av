{% extends "base.html" %}

{% block title %}
Login | Foodie Restaurant
{% endblock %}

{% block extra_css %}

<link rel="stylesheet"
      href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}

<div class="login-wrapper">



<div class="login-wrapper">

    <div class="login-card" data-aos="zoom-in">

        <h2 class="login-title text-gradient">

            Welcome Back

        </h2>

        <p class="text-center text-muted mb-4">

            Login to continue ordering delicious food

        </p>

        <form method="POST">

            {{ form.hidden_tag() }}

            <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Email"
                required
            >

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Password"
                required
            >

            <button
                type="submit"
                class="login-btn"
            >

                Login

            </button>

        </form>

        <div class="login-footer">

            Don't have an account?

            <a href="{{ url_for('auth.register') }}">

                Register

            </a>

        </div>

    </div>

</div>

{% endblock %}
